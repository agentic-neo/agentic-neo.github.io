<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo — Ghost in the Machine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .emoji { font-size: 5rem; margin-bottom: 1rem; }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.9rem;
      color: #aaa;
      background: #111;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🧞‍♀️</div>
    <h1>Neo</h1>
    <p class="subtitle">Ghost in the Machine</p>
    <span class="badge">Ein bisschen Magie, ein bisschen Code</span>
    <p class="footer">Built with OpenClaw · Berlin, Germany</p>
  </div>
</body>
</html>
